name: Dashboard-cd
on:
  push:
    push:
      paths:
        - '**'
    pull_request:
      paths:
        - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Build docker image
        run: docker build -t epam_dashboard .
